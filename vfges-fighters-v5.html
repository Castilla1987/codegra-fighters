<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/styles2.css">
<link rel="stylesheet" href="css/mode.css">
<link rel="stylesheet" href="css/retro-screens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<title>Codegra Fighters</title>

</head>
<body>
<div id="app">
<div id="app-inner">
  <video id="menu-video" class="hidden" autoplay loop muted playsinline></video>
  <div id="game-canvas-wrap">
    <canvas id="game" width="900" height="520"></canvas>
    <div id="hud" class="hidden">
      <div class="hudside left">
        <div class="hudname" id="p1name">P1</div>
        <div class="hpbar-bg" id="p1hpbg"><div class="hpbar-chip" id="p1chip"></div><div class="hpbar" id="p1hp"></div></div>
        <div class="spbar-bg"><div class="spbar" id="p1sp"></div></div>
      </div>
      <div class="hudside right">
        <div class="hudname" id="p2name">P2</div>
        <div class="hpbar-bg" id="p2hpbg"><div class="hpbar-chip" id="p2chip"></div><div class="hpbar" id="p2hp"></div></div>
        <div class="spbar-bg"><div class="spbar" id="p2sp"></div></div>
      </div>
    </div>
    <div id="timer" class="hidden">90</div>
    <div id="controls-hint" class="hidden"></div>
    <button id="btn-pause" class="hidden" aria-label="Pausa">❚❚</button>

    <!-- PAUSE OVERLAY -->
    <div id="pause-overlay" class="hidden">
      <div id="pause-panel">
        <h2>PAUSA</h2>
        <button class="btn" id="btn-resume">▶ REANUDAR</button>
        <button class="btn small" id="btn-restart-fight">⟲ REINICIAR COMBATE</button>
        <button class="btn small" id="btn-quit-fight">✕ SALIR AL MENÚ</button>
      </div>
    </div>
  </div>

  <!-- Virtual touch controls (P1 only — for 1-player mode on mobile) -->
  <div id="touch-controls">
    <div class="tc-side tc-left">
      <div class="tc-dpad">
        <div class="tc-btn tc-jump-btn" data-key="w">▲</div>
        <div class="tc-btn tc-left-btn" data-key="a">◀</div>
        <div class="tc-btn tc-block-btn" data-key="s">▼</div>
        <div class="tc-btn tc-right-btn" data-key="d">▶</div>
      </div>
    </div>
    <div class="tc-side tc-right">
      <div class="tc-actions">
        <div class="tc-btn" data-key="f">PUÑO</div>
        <div class="tc-btn" data-key="g">PATADA</div>
        <div class="tc-btn tc-special" data-key="h">ESPECIAL</div>
      </div>
    </div>
  </div>


  <!-- TITLE -->
  <div class="screen" id="screen-title" style="padding:0;overflow:hidden;border:none;background:#000;">
    <!-- Fondo full-screen -->
    <img id="title-bg-img" src="./assets/backgrounds/Inicio.png"
         alt="Codegra Fighters"
         style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0;"
         draggable="false">

    <!-- Capa de oscurecimiento suave para que resalten logo y botones -->
    <div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(5,3,20,0.18) 0%,rgba(5,3,20,0.45) 100%);z-index:1;pointer-events:none;"></div>

    <!-- Contenido: logo + menú -->
    <div id="title-overlay" style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2vh,22px);padding:2% 4%;">

      <!-- LOGO -->
      <img id="title-logo"
           src="./assets/logo.png"
           alt="Codegra Fighters"
           style="width:clamp(280px,48%,600px);height:auto;filter:drop-shadow(0 0 24px rgba(0,229,255,0.6)) drop-shadow(0 0 48px rgba(255,0,204,0.4));margin-bottom:clamp(4px,1.5vh,18px);">

      <!-- MENÚ VERTICAL -->
      <!-- <nav id="title-menu" style="display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.4vh,16px);width:100%;max-width:520px; text-transform: uppercase;">

        <button id="title-btn-jugar" class="title-menu-btn title-menu-btn--primary">
          <span class="title-menu-icon">👊</span>
          <span class="title-menu-label">Jugar</span>
        </button>

        <button id="title-btn-opciones" class="title-menu-btn">
          <span class="title-menu-icon">⚙️</span>
          <span class="title-menu-label">Opciones</span>
        </button>

        <button id="title-btn-musica" class="title-menu-btn">
          <span class="title-menu-icon">🎵</span>
          <span class="title-menu-label">Musica</span>
        </button>

        <button id="title-btn-entrenamiento" class="title-menu-btn">
          <span class="title-menu-icon">🏋️</span>
          <span class="title-menu-label">Entrenamiento</span>
        </button>

      </nav> -->
      <nav id="title-menu">
        <button id="title-btn-jugar"
                class="title-menu-btn title-menu-btn--pink">
          <span class="title-menu-icon">👊</span>
          <span class="title-menu-label">JUGAR</span>
        </button>

        <button id="title-btn-opciones"
                class="title-menu-btn title-menu-btn--blue">
          <span class="title-menu-icon">⚙</span>
          <span class="title-menu-label">OPCIONES</span>
        </button>

        <button id="title-btn-musica"
                class="title-menu-btn title-menu-btn--purple">
          <span class="title-menu-icon">🎵</span>
          <span class="title-menu-label">MÚSICA</span>
        </button>

        <button id="title-btn-entrenamiento"
                class="title-menu-btn title-menu-btn--purple">
          <span class="title-menu-icon">🏋</span>
          <span class="title-menu-label">ENTRENAMIENTO</span>
        </button>
      </nav>
    </div>

    <!-- Música de fondo -->
    <audio id="audio-bg" loop preload="none">
      <source src="assets/music/Guardia de Neon 3.ogg" type="audio/ogg">
    </audio>
  </div>

  <div class="screen hidden" id="screen-mode">
    <h1 class="title" style="font-size:clamp(26px,5vw,44px);">ELIGE MODO</h1>
    <div class="row">
      <button class="btn" id="btn-1p"
        >1 JUGADOR<br><span style="font-size:0.7em;">vs Colegiados (CPU)</span></button>
      <button class="btn alt" id="btn-2p"
        >2 JUGADORES<br><span style="font-size:0.7em;">Mismo teclado</span></button>
    </div>
    <button class="btn small" id="btn-back-mode"
      >◀ VOLVER</button>
  </div>

  <!-- STAGE SELECT -->
  <div class="screen hidden" id="screen-stage">
    <h1 class="title" style="font-size:clamp(22px,4.5vw,38px);">ELIGE ESCENARIO</h1>
    <div class="grid" id="gridStage"></div>
    <button class="btn small" id="btn-back-stage"
      >◀ VOLVER</button>
  </div>

  <!-- SELECT P1 -->
  <div class="screen hidden" id="screen-select1">
    <div id="arcade-select-wrap">
      <div id="arcade-header">
        JUGADOR 1 &mdash; ELIGE TU PERSONAJE
        <span class="arcade-player-badge" style="--pbadge:#2e86de;">P1</span>
      </div>
      <div id="arcade-stage">
        <div id="arcade-roster" id="grid1"></div>
        <div id="arcade-preview">
          <div id="arcade-preview-frame">
            <img id="arcade-char-sprite" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBTAA7" alt="">
            <div id="arcade-color-bar"></div>
          </div>
          <div id="arcade-preview-info">
            <div id="arcade-preview-name">???</div>
            <div id="arcade-preview-role"></div>
            <div id="arcade-preview-special">ESPECIAL: <span id="arcade-preview-special-name"></span></div>
          </div>
        </div>
      </div>
      <div id="arcade-footer">
        <button id="arcade-back-btn" id="btn-back-select1"  onmousedown="this.style.transform='translate(3px,3px)';this.style.boxShadow='0 0 0 #00e5ff'" onmouseup="this.style.transform='';this.style.boxShadow='3px 3px 0 #00e5ff'" onmouseleave="this.style.transform='';this.style.boxShadow='3px 3px 0 #00e5ff'">◀ VOLVER</button>
        <button id="arcade-confirm-btn" disabled  onmousedown="if(!this.disabled){this.style.transform='translate(4px,4px)';this.style.boxShadow='0 0 0 #ff2e63'}" onmouseup="this.style.transform='';this.style.boxShadow='4px 4px 0 #ff2e63, 8px 8px 0 rgba(0,0,0,0.45)'" onmouseleave="this.style.transform='';this.style.boxShadow='4px 4px 0 #ff2e63, 8px 8px 0 rgba(0,0,0,0.45)'">ELEGIR ▶</button>
      </div>
    </div>
  </div>

  <!-- SELECT P2 / ENEMY -->
  <div class="screen hidden" id="screen-select2">
    <div id="arcade-select-wrap">
      <div id="arcade-header">
        JUGADOR 2 &mdash; ELIGE TU PERSONAJE
        <span class="arcade-player-badge" style="--pbadge:#e84393;">P2</span>
      </div>
      <div id="arcade-stage">
        <div id="arcade-roster" id="grid2"></div>
        <div id="arcade-preview">
          <div id="arcade-preview-frame">
            <img id="arcade-char-sprite" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBTAA7" alt="">
            <div id="arcade-color-bar"></div>
          </div>
          <div id="arcade-preview-info">
            <div id="arcade-preview-name">???</div>
            <div id="arcade-preview-role"></div>
            <div id="arcade-preview-special">ESPECIAL: <span id="arcade-preview-special-name"></span></div>
          </div>
        </div>
      </div>
      <div id="arcade-footer">
        <button id="arcade-back-btn" id="btn-back-select2"  onmousedown="this.style.transform='translate(3px,3px)';this.style.boxShadow='0 0 0 #00e5ff'" onmouseup="this.style.transform='';this.style.boxShadow='3px 3px 0 #00e5ff'" onmouseleave="this.style.transform='';this.style.boxShadow='3px 3px 0 #00e5ff'">◀ VOLVER</button>
        <button id="arcade-confirm-btn" disabled  onmousedown="if(!this.disabled){this.style.transform='translate(4px,4px)';this.style.boxShadow='0 0 0 #ff2e63'}" onmouseup="this.style.transform='';this.style.boxShadow='4px 4px 0 #ff2e63, 8px 8px 0 rgba(0,0,0,0.45)'" onmouseleave="this.style.transform='';this.style.boxShadow='4px 4px 0 #ff2e63, 8px 8px 0 rgba(0,0,0,0.45)'">ELEGIR ▶</button>
      </div>
    </div>
  </div>

  <!-- VS CARD -->
  <div class="screen hidden" id="screen-vs">
    <h1 class="title">¡A PELEAR!</h1>
    <div class="vsbox">
      <div style="text-align:center;">
        <img class="versus-pic" id="vs-p1-img">
        <div id="vs-p1-name" style="font-weight:700; margin-top:6px;"></div>
      </div>
      <div class="vsword">VS</div>
      <div style="text-align:center;">
        <img class="versus-pic" id="vs-p2-img">
        <div id="vs-p2-name" style="font-weight:700; margin-top:6px;"></div>
      </div>
    </div>
    <p class="flavor" id="vs-flavor"></p>
    <button class="btn" id="btn-fight"
      >¡PELEA!</button>
  </div>

  <!-- RESULT -->
  <div class="screen hidden" id="screen-result">
    <h1 class="title" id="result-title">RESULTADO</h1>
    <p class="flavor" id="result-text"></p>
    <div class="row" id="result-buttons"></div>
  </div>
</div>
</div>
<!-- PANTALLA DE ENTRENAMIENTO -->

<div class="screen hidden" id="screen-training">
  <h1 class="title">🥊 MODO ENTRENAMIENTO</h1>
  <div style="background:rgba(0,0,0,0.55); padding:20px; border-radius:10px; margin:16px auto; max-width:460px;">

    <!-- Selección de personaje -->
    <div style="margin-bottom:14px;">
      <label style="display:block; margin-bottom:6px; color:var(--accent2); font-weight:bold;">Tu personaje:</label>
      <div id="training-char-select" style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px;"></div>
      <div style="color:var(--cream); font-size:13px;">Seleccionado: <strong id="training-selected-name" style="color:var(--accent2);">—</strong></div>
    </div>

    <!-- Oponente -->
    <div style="margin:12px 0;">
      <label style="display:block; margin-bottom:5px; color:var(--cream);">Comportamiento del oponente:</label>
      <select id="training-opponent" style="width:100%; padding:8px; background:#1b2a4a; border:2px solid var(--accent2); border-radius:5px; color:var(--cream);">
        <option value="static">Estático (no se mueve)</option>
        <option value="passive">Pasivo (bloquea a veces)</option>
        <option value="aggressive">Agresivo (ataca al azar)</option>
        <option value="mirror">Espejo (copia tus movimientos)</option>
      </select>
    </div>

    <!-- Recargar (solo durante combate) -->
    <div style="margin:12px 0;">
      <label style="display:block; margin-bottom:6px; color:var(--cream);">Recargar (durante el combate):</label>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn small" id="btn-refill-hp">❤️ HP</button>
        <button class="btn small" id="btn-refill-meter">⚡ METER</button>
        <button class="btn small" id="btn-reset-position">↩️ POSICIÓN</button>
      </div>
    </div>

    <!-- Debug visuales -->
    <div style="margin:12px 0;">
      <label style="display:block; margin-bottom:6px; color:var(--cream);">Debug visual:</label>
      <div style="display:flex; gap:16px; flex-wrap:wrap;">
        <label style="color:var(--cream); display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="debug-hitboxes"> Hitboxes
        </label>
        <label style="color:var(--cream); display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="debug-hurtboxes"> Hurtboxes
        </label>
      </div>
    </div>

    <!-- Botones de acción -->
    <div style="text-align:center; margin-top:16px; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <button class="btn" id="btn-training-fight">¡COMENZAR<br>ENTRENAMIENTO!</button>
      <button class="btn small" id="btn-back-training">← VOLVER AL MENÚ</button>
    </div>
  </div>
</div>
</body>
<script src="./js/scripts.js"></script>
<script src="./js/data.js"></script>
<script src="./js/state.js"></script>
<script src="./js/assets.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/fighters.js"></script>
<script src="./js/renderer.js"></script>
<script src="./js/main.js"></script>
</html>
